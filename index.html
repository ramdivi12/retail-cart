<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetailMart - Shopping Cart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1>RetailMart</h1>
      <div class="cart-icon" id="cart-icon">
        🛒 <span id="cart-count">0</span>
      </div>
    </div>
  </header>

  <main>
    <section class="products-section">
      <h2>Products</h2>
      <div class="category-filter">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="fruits">Fruits</button>
        <button class="filter-btn" data-category="dairy">Dairy</button>
        <button class="filter-btn" data-category="snacks">Snacks</button>
        <button class="filter-btn" data-category="beverages">Beverages</button>
        <button class="filter-btn" data-category="bakery">Bakery</button>
      </div>
      <div class="products-grid" id="products-grid"></div>
    </section>

    <section class="cart-section" id="cart-section">
      <div class="cart-overlay" id="cart-overlay"></div>
      <div class="cart-panel" id="cart-panel">
        <div class="cart-header">
          <h2>Your Cart</h2>
          <button class="close-cart" id="close-cart">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
          <p class="empty-cart-msg" id="empty-cart-msg">Your cart is empty</p>
        </div>
        <div class="cart-footer" id="cart-footer">
          <div class="cart-summary">
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
              <span>Tax (8%)</span>
              <span id="tax">$0.00</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="total">$0.00</span>
            </div>
          </div>
          <button class="checkout-btn" id="checkout-btn">Checkout</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
